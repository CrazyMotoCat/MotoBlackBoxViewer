<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moto Route Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    html, body, #map { height: 100%; margin: 0; }
    body { background: #090204; color: #f4e7ea; font-family: Segoe UI, Arial, sans-serif; }
    #map { background: #090204; }
    .panel {
      position: absolute;
      z-index: 1000;
      background: rgba(22, 7, 10, 0.92);
      color: #f4e7ea;
      border: 1px solid rgba(120, 45, 61, 0.45);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
    }
    #status {
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      max-width: 340px;
      font-size: 13px;
      line-height: 1.35;
    }
    #status.hidden {
      display: none;
    }
    .leaflet-control-attribution { font-size: 11px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status" class="panel">Map is ready. Load a CSV in the app.</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    let map;
    let routeData = [];
    let routeLine = null;
    let startMarker = null;
    let finishMarker = null;
    let selectedMarker = null;
    let pendingPanTarget = null;
    let pendingPanTimer = null;

    const statusEl = document.getElementById('status');

    function setStatus(text) {
      statusEl.classList.remove('hidden');
      statusEl.textContent = text;
    }

    function hideStatus() {
      statusEl.classList.add('hidden');
    }

    function initMap() {
      if (!window.L) {
        setStatus('Failed to load Leaflet/OpenStreetMap. Check your internet connection.');
        return;
      }

      map = L.map('map', {
        zoomControl: true,
        preferCanvas: true
      }).setView([43.116877, 131.896234], 15);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors',
        keepBuffer: 10,
        updateWhenIdle: true,
        updateWhenZooming: false
      }).addTo(map);

      if (Array.isArray(routeData) && routeData.length > 0) {
        setRouteData(routeData);
      } else {
        setStatus('Map is ready. Load a CSV in the app.');
      }
    }

    function clearMapObjects() {
      if (!map) return;
      for (const layer of [routeLine, startMarker, finishMarker, selectedMarker]) {
        if (layer) map.removeLayer(layer);
      }
      routeLine = null;
      startMarker = null;
      finishMarker = null;
      selectedMarker = null;
    }

    function setRouteData(points) {
      routeData = Array.isArray(points) ? points : [];

      if (!map) return;
      clearMapObjects();

      if (!routeData.length) {
        setStatus('Route is empty. Load a CSV file.');
        return;
      }

      const latLngs = routeData.map(point => [point.lat, point.lon]);
      routeLine = L.polyline(latLngs, {
        color: '#d45c6b',
        weight: 5,
        opacity: 0.9
      }).addTo(map);

      const first = routeData[0];
      const last = routeData[routeData.length - 1];

      startMarker = L.circleMarker([first.lat, first.lon], {
        radius: 7,
        color: '#22c55e',
        weight: 2,
        fillColor: '#22c55e',
        fillOpacity: 0.9
      }).addTo(map).bindTooltip('Start');

      finishMarker = L.circleMarker([last.lat, last.lon], {
        radius: 7,
        color: '#ef4444',
        weight: 2,
        fillColor: '#ef4444',
        fillOpacity: 0.9
      }).addTo(map).bindTooltip('Finish');

      map.fitBounds(routeLine.getBounds(), { padding: [28, 28] });
      hideStatus();
    }

    function setSelectedPoint(lat, lon, isPlaybackRunning, isManualScrubbing) {
      if (!map) {
        return;
      }

      if (lat === null || lat === undefined || lon === null || lon === undefined) {
        if (selectedMarker) {
          map.removeLayer(selectedMarker);
          selectedMarker = null;
        }
        return;
      }

      if (!selectedMarker) {
        selectedMarker = L.circleMarker([lat, lon], {
          radius: 9,
          color: '#f08a5d',
          weight: 3,
          fillColor: '#fb923c',
          fillOpacity: 0.9
        }).addTo(map);
      } else {
        selectedMarker.setLatLng([lat, lon]);
      }

      schedulePanToSelectedPoint(lat, lon, isPlaybackRunning === true, isManualScrubbing === true);
    }

    function schedulePanToSelectedPoint(lat, lon, isPlaybackRunning, isManualScrubbing) {
      if (!map) {
        return;
      }

      const target = L.latLng(lat, lon);
      const currentBounds = map.getBounds();
      const safeVisibleBounds = currentBounds.pad(-0.08);
      const centeredBounds = currentBounds.pad(-0.35);

      if (safeVisibleBounds.isValid() && !safeVisibleBounds.contains(target)) {
        map.panInside(target, {
          paddingTopLeft: [96, 96],
          paddingBottomRight: [96, 96],
          animate: false
        });
      }

      if (pendingPanTimer) {
        clearTimeout(pendingPanTimer);
        pendingPanTimer = null;
      }

      pendingPanTarget = target;

      if (isManualScrubbing) {
        return;
      }

      if (centeredBounds.isValid() && centeredBounds.contains(target) && !isPlaybackRunning) {
        return;
      }

      const delay = isPlaybackRunning ? 70 : 100;
      pendingPanTimer = setTimeout(() => {
        pendingPanTimer = null;
        if (!pendingPanTarget || !map) {
          return;
        }

        map.panTo(pendingPanTarget, {
          animate: false
        });
        pendingPanTarget = null;
      }, delay);
    }

    function clearRouteData() {
      routeData = [];
      clearMapObjects();
      setStatus('Route is cleared. Load a CSV in the app.');
    }

    window.setRouteData = setRouteData;
    window.setSelectedPoint = setSelectedPoint;
    window.clearRouteData = clearRouteData;

    /*__ROUTE_BOOTSTRAP__*/
    window.addEventListener('load', initMap);
  </script>
</body>
</html>
